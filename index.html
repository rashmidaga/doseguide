<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f5241" />
  <meta name="description" content="DoseGuide: medication reminders, refill tracking and caregiver alerts, in one calm place." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>DoseGuide · Every dose, on time</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="phone">
    <div class="aurora a1"></div>
    <div class="aurora a2"></div>
    <div class="aurora a3"></div>

    <div class="app">
      <main class="screen" id="screen"></main>

      <nav class="tabbar" id="tabbar"><!-- built by app.js per role --></nav>
    </div>

    <!-- Onboarding overlay (first run) -->
    <div class="onboard" id="onboard" hidden></div>
  </div>

  <!-- Modal sheet -->
  <div class="modal-wrap" id="modalWrap" hidden>
    <div class="modal-scrim" id="modalScrim"></div>
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
